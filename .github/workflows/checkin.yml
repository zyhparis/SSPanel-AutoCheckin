name: SSPanel Auto Checkin

on:
  schedule:
    # 设定在北京时间早上 7:00 触发（UTC 23:00）
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Random delay & Run checkin
        env:
          COOKIE: ${{ secrets.COOKIE }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          # 使用纯 Bash 逻辑计算随机数（目前测试设为 0~10 秒，上线请改为 7200）
          MAX_DELAY=10
          RANDOM_DELAY=$(( RANDOM % MAX_DELAY ))
          echo "随机等待时间: $RANDOM_DELAY 秒"
          sleep $RANDOM_DELAY
          
          # 发送签到请求
          RESPONSE=$(curl -s -X POST "https://3j.wj-kc.com/user/checkin" \
            -H "cookie: $COOKIE" \
            -H "user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/126.0.0.0" \
            -H "referer: https://3j.wj-kc.com/user")
            
          echo "接口返回结果: $RESPONSE"
          
          # 判断签到结果
          if [[ "$RESPONSE" == *"msg"* ]] || [[ "$RESPONSE" == *"ret"* ]]; then
            echo "签到脚本已正常执行"
          else
            echo "签到异常！"
            if [ -n "$DINGTALK_WEBHOOK" ]; then
              curl -H "Content-Type: application/json" \
                   -d "{\"msgtype\": \"text\", \"text\": {\"content\": \"【签到失败提醒】机场自动签到未成功，响应信息：$RESPONSE\"}}" \
                   "$DINGTALK_WEBHOOK"
            fi
            exit 1
          fi
