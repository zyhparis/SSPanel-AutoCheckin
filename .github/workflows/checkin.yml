name: SSPanel Auto Checkin

on:
  schedule:
    # 设定在北京时间 7:43 触发 (UTC 23:43)
    # 上线后你可以把 43 改成任意你喜欢的分钟数（0~59）
    - cron: '43 23 * * *'
  workflow_dispatch: # 保留此项，支持随时手动测试

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run checkin
        env:
          COOKIE: ${{ secrets.COOKIE }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          # 测试阶段：秒级微调设为 0~3 秒，测试更快
          RANDOM_SEC=$(( RANDOM % 4 ))
          echo "微调等待 $RANDOM_SEC 秒..."
          sleep $RANDOM_SEC
          
          # 发送签到请求
          RESPONSE=$(curl -s -X POST "https://3j.wj-kc.com/user/checkin" \
            -H "cookie: $COOKIE" \
            -H "user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/126.0.0.0" \
            -H "referer: https://3j.wj-kc.com/user")
            
          echo "接口返回结果: $RESPONSE"
          
          # 判断签到结果
          if [[ "$RESPONSE" == *"msg"* ]] || [[ "$RESPONSE" == *"ret"* ]]; then
            echo "签到脚本已正常执行"
          else
            echo "签到异常！"
            if [ -n "$DINGTALK_WEBHOOK" ]; then
              curl -H "Content-Type: application/json" \
                   -d "{\"msgtype\": \"text\", \"text\": {\"content\": \"【签到失败提醒】机场自动签到未成功，响应信息：$RESPONSE\"}}" \
                   "$DINGTALK_WEBHOOK"
            fi
            exit 1
          fi
