name: SSPanel Auto Checkin

on:
  schedule:
    # 设定在北京时间每天 07:43 触发 (UTC 23:43)
    # 处的 43 可以随意改为你喜欢的 0~59 分钟数
    - cron: '43 23 * * *'
  workflow_dispatch: # 支持手动触发测试

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run checkin
        env:
          COOKIE: ${{ secrets.COOKIE }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: |
          # 0~3 秒微调延迟
          RANDOM_SEC=$(( RANDOM % 4 ))
          echo "微调等待 $RANDOM_SEC 秒..."
          sleep $RANDOM_SEC
          
          # 发送真实 API 签到请求
          RESPONSE=$(curl -s -X POST "https://ug.wj-kc.com/api/user/sign_use" \
            -H "cookie: $COOKIE" \
            -H "accept: application/json, text/plain, */*" \
            -H "user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/126.0.0.0" \
            -H "referer: https://3j.wj-kc.com/user")
            
          echo "接口返回结果: $RESPONSE"
          
          # 判断响应格式（只要包含 msg、code、ret 或包含成功/签到字样均判定通过）
          if [[ "$RESPONSE" == *"msg"* ]] || [[ "$RESPONSE" == *"code"* ]] || [[ "$RESPONSE" == *"ret"* ]] || [[ "$RESPONSE" == *"成功"* ]] || [[ "$RESPONSE" == *"签到"* ]]; then
            echo "签到脚本已正常执行"
          else
            echo "签到异常！"
            if [ -n "$DINGTALK_WEBHOOK" ]; then
              curl -H "Content-Type: application/json" \
                   -d "{\"msgtype\": \"text\", \"text\": {\"content\": \"【签到失败提醒】机场自动签到未成功，响应信息：$RESPONSE\"}}" \
                   "$DINGTALK_WEBHOOK"
            fi
            exit 1
          fi
