name: SSPanel Auto Checkin

on:
  schedule:
    # 设定在 UTC 23:00（即北京时间早上 7:00）触发
    - cron: '0 23 * * *'
  workflow_dispatch: # 支持手动触发测试

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Random delay & Run checkin
        env:
          COOKIE: ${{ secrets.COOKIE }}
        run: |
          # 生成 0 到 7200 秒（0~2小时）之间的随机数
          RANDOM_DELAY=$((RANDOM % 7200))
          echo "随机等待时间: $RANDOM_DELAY 秒"
          sleep $RANDOM_DELAY
          
          # 执行签到请求
          curl -s -X POST "https://3j.wj-kc.com/user/checkin" \
            -H "cookie: $COOKIE" \
            -H "user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            -H "referer: https://3j.wj-kc.com/user"
