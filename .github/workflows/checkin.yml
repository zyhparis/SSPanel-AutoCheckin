name: SSPanel Auto Checkin

on:
  schedule:
    # 每天下午触发两次，完美踩中全球 Actions 流量的最低谷时段
    # 北京时间 13:43（UTC 05:43）
    - cron: "43 5 * * *"
    # 北京时间 14:18（UTC 06:18）
    - cron: "18 6 * * *"

  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Randomized Checkin
        env:
          COOKIE: ${{ secrets.COOKIE }}

        run: |
          ########################################
          # 1. 环境依赖检测
          ########################################
          if ! command -v jq >/dev/null 2>&1; then
              echo "❌ jq 未安装"
              exit 1
          fi

          ########################################
          # 2. 打印启动时间
          ########################################
          echo "北京时间启动：$(date -u -d '+8 hour' '+%F %T')"

          ########################################
          # 3. 定时任务随机等待（手动执行不等待）
          ########################################
          if [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]; then
              RANDOM_DELAY=$(( RANDOM % 301 ))
              TARGET_TIME=$(date -u -d "+8 hour +${RANDOM_DELAY} seconds" "+%F %T")

              echo "随机等待：${RANDOM_DELAY} 秒"
              echo "预计签到时间：$TARGET_TIME"

              sleep "$RANDOM_DELAY"
          fi

          ########################################
          # 4. 调用签到接口（打印真实发包时间）
          ########################################
          echo "北京时间请求发送：$(date -u -d '+8 hour' '+%F %T')"

          RESPONSE=$(curl \
            --silent \
            --show-error \
            --fail-with-body \
            --max-time 30 \
            -X POST "https://ug.wj-kc.com/api/user/sign_use" \
            -H "cookie: $COOKIE" \
            -H "accept: application/json, text/plain, */*" \
            -H "user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/126.0.0.0" \
            -H "referer: https://3j.wj-kc.com/user" \
            2>&1)

          CURL_EXIT=$?

          if [ $CURL_EXIT -ne 0 ]; then
              echo "======================================"
              echo "❌ curl 请求失败"
              echo "退出码：$CURL_EXIT"
              echo "$RESPONSE"
              echo "======================================"
              exit 1
          fi

          ########################################
          # 5. Base64 解码
          ########################################
          DECODED_DATA=$(echo "$RESPONSE" | grep -oP '"data":"\K[^"]+' | base64 -d 2>/dev/null || true)

          SUCCESS=false
          CODE=""
          MSG=""

          ########################################
          # 6. 解析状态码
          ########################################
          if [ -n "$DECODED_DATA" ]; then

              CODE=$(echo "$DECODED_DATA" | jq -r '.code // empty')
              MSG=$(echo "$DECODED_DATA" | jq -r '.msg // empty')

              echo "CODE : $CODE"
              echo "MSG  : $MSG"

              # 已验证：今日已签到（严格的 AND 校验）
              if [[ "$CODE" == "1028" && "$MSG" == "SIGN_USE_MULTY_TIMES" ]]; then
                  SUCCESS=true
              
              # 已验证：首签成功状态码（严格的 AND 校验）
              elif [[ "$CODE" == "0" && "$MSG" == "SUCCESS" ]]; then
                  SUCCESS=true
              fi

          fi

          ########################################
          # 7. 成功分支
          ########################################
          if [ "$SUCCESS" = true ]; then
              echo "✅ 今日签到成功 / 已签到"
              exit 0
          fi

          ########################################
          # 8. 输出完整排查日志
          ########################################
          echo "======================================"
          echo "❌ 未识别状态（可能是首签或 Cookie 失效）"
          echo "CODE     : $CODE"
          echo "MSG      : $MSG"
          echo
          echo "DECODED:"
          echo "$DECODED_DATA"
          echo
          echo "RAW:"
          echo "$RESPONSE"
          echo "======================================"

          exit 1
